<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>orbit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0a0a0a;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}
canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
.scene{position:relative;z-index:10;perspective:900px;}
.wrap{transform-style:preserve-3d;will-change:transform;}

.card{
  width:320px;
  border-radius:20px;
  background:#ffffff;
  box-shadow:
    0 2px 0 #ddd,
    0 25px 50px rgba(0,0,0,0.55),
    0 60px 120px rgba(0,0,0,0.3);
  overflow:hidden;
  transform-style:preserve-3d;
}

/* BANNER */
.banner{width:100%;height:100px;position:relative;overflow:hidden;background:#111;}
.banner img{width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block;filter:brightness(0.7);}

/* AVATAR */
.av-wrap{position:absolute;left:16px;top:60px;z-index:5;}
.av-ring{
  width:72px;height:72px;border-radius:50%;
  padding:3px;background:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.av-ring img{
  width:100%;height:100%;border-radius:50%;
  object-fit:cover;object-position:center top;
  display:block;border:2px solid #f0f0f0;
}
.sdot{
  position:absolute;bottom:3px;right:3px;
  width:14px;height:14px;border-radius:50%;
  background:#9ca3af;border:3px solid #fff;transition:background .3s;
}
.sdot.online{background:#22c55e;}
.sdot.idle{background:#f59e0b;}
.sdot.dnd{background:#ef4444;}

/* WHITE BODY */
.body{background:#fff;padding:8px 16px 0;margin-top:40px;}
.name{font-size:18px;font-weight:700;color:#0a0a0a;letter-spacing:-0.03em;}
.handle{font-size:11px;color:#9ca3af;font-weight:400;margin-top:1px;}
.divline{height:1px;background:linear-gradient(90deg,transparent,#e5e5e5 30%,#e5e5e5 70%,transparent);margin:12px 0;}

/* BLACK SECTION */
.dark{
  background:#0f0f0f;
  margin:0 -16px;
  padding:14px 16px 18px;
  border-top:1px solid #e5e5e5;
}
.act-label{
  font-size:9px;font-weight:600;color:#3a3a3a;
  letter-spacing:.14em;text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:7px;
}
.dot-blink{
  width:5px;height:5px;border-radius:50%;
  background:#fff;display:inline-block;
  animation:blink 1.8s infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.1;}}

.sp-row{display:flex;align-items:center;gap:10px;}
.alb{width:42px;height:42px;border-radius:6px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.7);}
.alb-ph{width:42px;height:42px;border-radius:6px;background:#1a1a1a;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#333;font-size:18px;}
.tk{flex:1;min-width:0;}
.tk-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tk-art{font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.prog{margin-top:10px;height:2px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;width:0%;background:#fff;border-radius:2px;animation:prog 30s linear infinite;}
@keyframes prog{from{width:4%;}to{width:100%;}}

.gm-row{display:flex;align-items:center;gap:10px;}
.gm-ico{width:42px;height:42px;border-radius:8px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid #222;}
.gm-name{font-size:12px;font-weight:600;color:#fff;}
.gm-det{font-size:11px;color:#555;margin-top:2px;}
.no-act{font-size:10px;color:#2a2a2a;text-align:center;padding:10px 0;letter-spacing:.1em;}

.links{display:flex;gap:6px;margin-top:14px;}
.lnk{
  flex:1;padding:8px 0;border-radius:8px;
  background:transparent;border:1px solid #1f1f1f;
  color:#3a3a3a;font-size:9px;font-weight:600;
  letter-spacing:.1em;text-align:center;
  text-transform:uppercase;cursor:pointer;
  transition:all .2s;text-decoration:none;
  display:block;font-family:inherit;
}
.lnk:hover{border-color:#fff;color:#fff;}
</style>
</head>

      </div>

      <div class="body">
        <div class="name">orbit</div>
        <div class="handle">@orbit_yo</div>
        <div class="divline"></div>

        <div class="dark">
          <div class="act-label">
            <span class="dot-blink"></span>
            <span id="alabel">activity</span>
          </div>
          <div id="act"><div class="no-act">—</div></div>
          <div class="links">
            <a class="lnk" href="#">github</a>
            <a class="lnk" href="#">discord</a>
            <a class="lnk" href="#">contact</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ── BG ─────────────────────────────────────────
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W,H;
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
rsz();addEventListener('resize',rsz);

const pts=Array.from({length:70},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:Math.random()*1.2+0.3,
  vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
  a:Math.random()*.3+.05
}));

let mx=.5,my=.5;
addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H;});

function draw(){
  cx.fillStyle='rgba(10,10,10,0.18)';
  cx.fillRect(0,0,W,H);
  pts.forEach(p=>{
    p.x+=p.vx+(mx-.5)*.06;p.y+=p.vy+(my-.5)*.06;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${p.a})`;cx.fill();
  });
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<110){
      cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);
      cx.strokeStyle=`rgba(255,255,255,${(1-d/110)*.05})`;cx.lineWidth=.5;cx.stroke();
    }
  }
  requestAnimationFrame(draw);
}
draw();

// ── 3D TILT ────────────────────────────────────
const wrap=document.getElementById('wrap');
const card=document.getElementById('card');
let rx=0,ry=0,tx=0,ty=0,hov=false;
card.addEventListener('mouseenter',()=>hov=true);
card.addEventListener('mouseleave',()=>{hov=false;tx=0;ty=0;});
card.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  tx=((e.clientY-r.top)/r.height-.5)*22;
  ty=-((e.clientX-r.left)/r.width-.5)*22;
});
(function tilt(){
  rx+=(tx-rx)*.1;ry+=(ty-ry)*.1;
  wrap.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(${hov?1.04:1})`;
  requestAnimationFrame(tilt);
})();

// ── LANYARD ────────────────────────────────────
const UID='1516311607184064586';
const sdot=document.getElementById('sdot');
const act=document.getElementById('act');
const albl=document.getElementById('alabel');

async function poll(){
  try{
    const j=await(await fetch(`https://api.lanyard.rest/v1/users/${UID}`)).json();
    if(!j.success)return;
    const d=j.data,s=d.discord_status||'offline';
    sdot.className='sdot '+({'online':'online','idle':'idle','dnd':'dnd'}[s]||'');
    const sp=d.activities?.find(a=>a.id==='spotify:1');
    const gm=d.activities?.find(a=>a.type===0&&a.id!=='spotify:1');
    if(sp){
      albl.textContent='listening to spotify';
      const img=sp.assets?.large_image?.startsWith('spotify:')?`https://i.scdn.co/image/${sp.assets.large_image.replace('spotify:','')}`:null;
      act.innerHTML=`<div class="sp-row">${img?`<img class="alb" src="${img}" alt=""/>`:'<div class="alb-ph">♪</div>'}<div class="tk"><div class="tk-name">${sp.details||''}</div><div class="tk-art">${sp.state||''}</div></div></div><div class="prog"><div class="prog-fill"></div></div>`;
    }else if(gm){
      albl.textContent='playing';
      act.innerHTML=`<div class="gm-row"><div class="gm-ico">🎮</div><div><div class="gm-name">${gm.name}</div>${gm.details?`<div class="gm-det">${gm.details}</div>`:''}</div></div>`;
    }else{
      albl.textContent='activity';
      act.innerHTML='<div class="no-act">—</div>';
    }
  }catch{}
}
poll();setInterval(poll,10000);
</script>
