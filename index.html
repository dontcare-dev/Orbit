<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ded — @deathy_dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --white: #ffffff;
    --glass-strong: rgba(255,255,255,0.94);
    --glass: rgba(255,255,255,0.74);
    --glass-edge: rgba(255,255,255,0.65);
    --ink: #101a30;
    --ink-soft: #51607e;
    --blue: #2f6fef;
    --blue-deep: #143a9c;
    --blue-glow: #8fc1ff;
    --shadow-ambient: 0 30px 70px -18px rgba(6, 14, 34, 0.55);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; }

  body{
    font-family:'Inter', sans-serif;
    color: var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing: antialiased;
  }

  .bg-video{
    position:fixed; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:-3;
    filter: saturate(1.05) brightness(0.9);
  }

  .bg-overlay{
    position:fixed; inset:0; z-index:-2;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(20,40,90,0.15), transparent 60%),
      linear-gradient(180deg, rgba(6,12,28,0.42) 0%, rgba(5,9,22,0.62) 55%, rgba(4,7,18,0.78) 100%);
  }

  #waterCanvas{
    position:fixed; inset:0;
    width:100%; height:100%;
    z-index:-1;
    pointer-events:none;
    mix-blend-mode: screen;
    opacity:0.82;
  }

  .sun-rays{
    position:fixed;
    top:0; left:0;
    width:100vw; height:100vh;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .sun-rays::before{
    content:"";
    position:absolute;
    top:-5%; left:20%;
    width:160%; height:160%;
    transform-origin: 15% 0%;
    background: conic-gradient(
      from -5deg at 15% 0%,
      transparent 0deg,   rgba(255,240,160,0.09) 1.5deg,  transparent 3.5deg,
      transparent 5deg,   rgba(255,235,140,0.06) 6deg,    transparent 8deg,
      transparent 10deg,  rgba(255,245,180,0.10) 11.5deg, transparent 13.5deg,
      transparent 17deg,  rgba(255,230,120,0.05) 18deg,   transparent 20.5deg,
      transparent 22deg,  rgba(255,245,175,0.08) 23.5deg, transparent 25.5deg,
      transparent 29deg,  rgba(255,235,140,0.07) 30.5deg, transparent 33deg,
      transparent 36deg,  rgba(255,240,155,0.06) 37deg,   transparent 39.5deg,
      transparent 43deg,  rgba(255,230,130,0.09) 44.5deg, transparent 47deg,
      transparent 50deg,  rgba(255,245,160,0.05) 51.5deg, transparent 54deg,
      transparent 360deg
    );
    animation: rays-drift 22s ease-in-out infinite alternate;
    filter: blur(1.5px);
  }
  .sun-rays::after{
    content:"";
    position:absolute;
    top:-5%; left:20%;
    width:160%; height:160%;
    transform-origin: 15% 0%;
    background: conic-gradient(
      from -5deg at 15% 0%,
      transparent 0deg,   rgba(200,225,255,0.05) 2deg,    transparent 5deg,
      transparent 8deg,   rgba(210,230,255,0.04) 9.5deg,  transparent 12deg,
      transparent 15deg,  rgba(200,220,255,0.06) 16.5deg, transparent 19deg,
      transparent 24deg,  rgba(215,235,255,0.04) 25deg,   transparent 28deg,
      transparent 33deg,  rgba(200,225,255,0.05) 34.5deg, transparent 37.5deg,
      transparent 360deg
    );
    animation: rays-drift 30s ease-in-out infinite alternate-reverse;
    filter: blur(2px);
  }
  @keyframes rays-drift{
    0%  { transform: rotate(-2deg) scaleX(0.97); opacity:0.75; }
    50% { opacity:1; }
    100%{ transform: rotate(3deg) scaleX(1.03); opacity:0.85; }
  }

  .sun-glare{
    position:fixed;
    top:-8vh; left:18vw;
    width: 55vw; height: 55vw;
    border-radius:50%;
    z-index:0;
    pointer-events:none;
    background: radial-gradient(circle at 40% 30%,
      rgba(255,245,180,0.28) 0%,
      rgba(255,220,100,0.12) 18%,
      rgba(255,200,80,0.05) 36%,
      transparent 60%
    );
    animation: glare-pulse 6s ease-in-out infinite alternate;
    filter: blur(2px);
  }
  @keyframes glare-pulse{
    from{ opacity:0.7; transform:scale(1); }
    to{ opacity:1; transform:scale(1.08); }
  }

  .particle{
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    z-index:2;
    will-change: transform, opacity;
  }

  .tap-ring{
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    z-index:3;
    transform:translate(-50%,-50%) scale(0);
    border:2px solid rgba(180,220,255,0.9);
    box-shadow: 0 0 8px rgba(140,200,255,0.6), inset 0 0 8px rgba(140,200,255,0.2);
    animation: tap-expand 1.1s cubic-bezier(.2,.6,.4,1) forwards;
  }
  .tap-ring:nth-child(2){ animation-delay:0.1s; border-color:rgba(255,245,180,0.7); box-shadow:0 0 8px rgba(255,230,120,.5); }
  .tap-ring:nth-child(3){ animation-delay:0.22s; border-color:rgba(200,230,255,0.5); }
  @keyframes tap-expand{
    0%  { transform:translate(-50%,-50%) scale(0);   opacity:1; }
    60% { opacity:0.6; }
    100%{ transform:translate(-50%,-50%) scale(1);   opacity:0; }
  }

  #loadingScreen{
    position:fixed; inset:0;
    z-index:999;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:18px;
    overflow:hidden;
    background:#050c28;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #loadingScreen.hide{
    opacity:0;
    pointer-events:none;
  }
  .loading-video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:0;
  }
  .loading-tint{
    position:absolute; inset:0;
    z-index:1;
    background:
      radial-gradient(circle at 50% 32%, rgba(79,139,255,0.55) 0%, rgba(33,80,196,0.6) 38%, rgba(12,31,92,0.78) 72%, rgba(5,12,40,0.88) 100%);
  }
  .enter-wrap, .enter-note{
    position:relative;
    z-index:2;
  }

  .enter-wrap{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .enter-ring{
    position:absolute;
    inset:-14px;
    border-radius:100px;
    border:2px solid rgba(255,255,255,0.35);
    animation: ring-pulse 2.4s ease-out infinite;
  }
  @keyframes ring-pulse{
    0%{ transform:scale(0.94); opacity:0.9; }
    100%{ transform:scale(1.25); opacity:0; }
  }

  .enter-btn{
    position:relative;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: clamp(1.05rem, 3vw, 1.3rem);
    color: var(--blue-deep);
    padding: 18px 42px;
    border-radius: 100px;
    border:none;
    cursor:pointer;
    background: linear-gradient(160deg, #ffffff, #e7efff);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.95) inset,
      0 20px 45px -12px rgba(4,12,38,0.65),
      0 0 0 1px rgba(255,255,255,0.55);
    letter-spacing:0.01em;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .enter-btn:hover{
    transform: translateY(-3px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.95) inset,
      0 26px 55px -12px rgba(4,12,38,0.7),
      0 0 0 1px rgba(255,255,255,0.6);
  }
  .enter-btn:active{ transform: translateY(0) scale(0.96); }
  .enter-btn:focus-visible{ outline:2px solid #fff; outline-offset:4px; }

  .enter-note{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.05em;
    color: rgba(255,255,255,0.65);
    text-transform:uppercase;
  }

  .stage{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 64px 20px 40px;
    perspective: 1400px;
  }

  .card{
    position:relative;
    width:100%;
    max-width:540px;
    border-radius:30px;
    --banner-h: clamp(150px, 30vw, 230px);
    --avatar-size: clamp(84px, 18vw, 116px);
    background: linear-gradient(165deg, var(--glass-strong), var(--glass));
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid var(--glass-edge);
    box-shadow:
      0 1.5px 0 rgba(255,255,255,0.95) inset,
      0 -30px 50px rgba(255,255,255,0.35) inset,
      var(--shadow-ambient),
      0 10px 40px -6px rgba(47,111,239,0.4);
    transform-style: preserve-3d;
    transition: transform 0.25s ease-out;
    opacity:0;
    animation: rise 0.9s 0.1s cubic-bezier(.2,.8,.2,1) forwards;
    overflow:hidden;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(26px) scale(0.97); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .banner-wrap{
    position:relative;
    height: var(--banner-h);
    overflow:hidden;
  }
  .banner{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    transform: scale(1.06);
    animation: drift 26s ease-in-out infinite alternate;
  }
  @keyframes drift{ from{ transform: scale(1.06) translateY(0); } to{ transform: scale(1.12) translateY(-2%); } }

  .banner-fade{
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(16,26,48,0) 45%, rgba(255,255,255,0.55) 92%, rgba(255,255,255,0.9) 100%);
  }

  .avatar-wrap{
    position:absolute;
    top: calc(var(--banner-h) + 38px - var(--avatar-size));
    left: 28px;
    transform: translateZ(50px);
    z-index:3;
  }
  .avatar{
    width: var(--avatar-size);
    height: var(--avatar-size);
    border-radius:50%;
    display:block;
    object-fit:cover;
    border: 4px solid #fff;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.95) inset,
      0 0 0 3px rgba(47,111,239,0.32),
      0 14px 30px -6px rgba(15,30,70,0.55);
  }
  .status-dot{
    position:absolute;
    right:2px; bottom:2px;
    width:18px; height:18px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #cdf3d8, #36c172 60%, #1e8e4f 100%);
    border:3px solid #fff;
    box-shadow: 0 2px 6px rgba(20,60,30,0.4);
  }
  .status-dot::after{
    content:"";
    position:absolute; inset:-4px;
    border-radius:50%;
    border:2px solid rgba(54,193,114,0.45);
    animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse{ 0%{ transform:scale(0.8); opacity:0.8;} 100%{ transform:scale(1.6); opacity:0;} }

  .card-body{
    padding: 56px 28px 32px;
    transform: translateZ(20px);
  }

  .identity{
    display:flex;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }
  .name{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: clamp(2.1rem, 6vw, 2.8rem);
    line-height:1;
    margin:0;
    letter-spacing:-0.02em;
    color: var(--ink);
    text-shadow: 0 1px 0 rgba(255,255,255,0.9), 0 8px 20px rgba(47,111,239,0.28);
  }

  .handle-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:4px;
  }
  .handle{
    font-family:'JetBrains Mono', monospace;
    font-size:0.92rem;
    color: var(--ink-soft);
    letter-spacing:0.01em;
  }

  .copy-btn{
    appearance:none;
    border:none;
    cursor:pointer;
    width:26px; height:26px;
    border-radius:9px;
    display:grid;
    place-items:center;
    background: linear-gradient(160deg, #ffffff, #eef3ff);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 1px 4px rgba(20,40,100,0.18),
      0 0 0 1px rgba(47,111,239,0.18);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position:relative;
  }
  .copy-btn:hover{ transform: translateY(-1px); }
  .copy-btn:active{ transform: translateY(0px) scale(0.95); }
  .copy-btn:focus-visible{
    outline:2px solid var(--blue);
    outline-offset:2px;
  }
  .copy-btn svg{ width:13px; height:13px; stroke: var(--blue-deep); }

  .copy-tip{
    position:absolute;
    top:-30px; left:50%;
    transform: translateX(-50%) translateY(4px);
    background: var(--ink);
    color:#fff;
    font-size:0.7rem;
    font-family:'Inter',sans-serif;
    padding:4px 9px;
    border-radius:7px;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .copy-tip.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  .bio{
    margin: 22px 0 0;
    font-size: clamp(1.02rem, 2.6vw, 1.18rem);
    line-height:1.55;
    color: var(--ink);
    font-weight:500;
    max-width: 38ch;
  }
  .bio::before{ content:"“"; color: var(--blue); font-family:'Space Grotesk',sans-serif; }
  .bio::after{ content:"”"; color: var(--blue); font-family:'Space Grotesk',sans-serif; }

  .chips{
    display:flex;
    gap:10px;
    margin-top:22px;
    flex-wrap:wrap;
  }
  .chip{
    font-size:0.82rem;
    font-weight:600;
    padding:8px 16px;
    border-radius:100px;
    font-family:'Inter',sans-serif;
    letter-spacing:0.01em;
  }
  .chip--ghost{
    color: var(--ink-soft);
    background: rgba(255,255,255,0.55);
    box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 1px 3px rgba(20,40,100,0.12);
    border:1px solid rgba(255,255,255,0.7);
  }
  .chip--blue{
    color:#fff;
    background: linear-gradient(160deg, #4f8bff, var(--blue-deep));
    box-shadow:
      0 1px 0 rgba(255,255,255,0.5) inset,
      0 8px 18px -4px rgba(20,60,160,0.55),
      0 0 0 1px rgba(20,58,156,0.4);
  }

  .divider{
    margin: 28px 0 0;
    height:1px;
    background: linear-gradient(90deg, transparent, rgba(47,111,239,0.25), transparent);
  }

  .meta-row{
    margin-top:18px;
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.74rem;
    color: rgba(81,96,126,0.85);
    letter-spacing:0.02em;
  }
  .meta-dot{ width:5px; height:5px; border-radius:50%; background: var(--blue); }

  @media (max-width: 420px){
    .card-body{ padding: 50px 22px 26px; }
    .avatar-wrap{ left:20px; }
  }

  @media (prefers-reduced-motion: reduce){
    .banner, .status-dot::after, .card{ animation: none !important; }
    .card{ opacity:1; transform:none; }
  }
</style>

<script>
  const enterBtn = document.getElementById('enterBtn');
  const loadingScreen = document.getElementById('loadingScreen');
  const TRACK_ID = '8GW6sLrK40k';

  let ytPlayer = null;
  let ytReady = false;

  function onYouTubeIframeAPIReady(){
    ytPlayer = new YT.Player('ytPlayer', {
      height: '0',
      width: '0',
      videoId: TRACK_ID,
      playerVars: {
        autoplay: 1,
        mute: 1,
        controls: 0,
        loop: 1,
        playlist: TRACK_ID
      },
      events: {
        onReady: ()=>{ ytReady = true; }
      }
    });
  }

  function startTrack(){
    if(ytPlayer && ytReady){
      ytPlayer.unMute();
      ytPlayer.setVolume(100);
      ytPlayer.playVideo();
    }else{
      const waitForReady = setInterval(()=>{
        if(ytPlayer && ytReady){
          ytPlayer.unMute();
          ytPlayer.setVolume(100);
          ytPlayer.playVideo();
          clearInterval(waitForReady);
        }
      }, 50);
    }
  }

  enterBtn.addEventListener('click', ()=>{
    startTrack();
    loadingScreen.classList.add('hide');
    setTimeout(()=> loadingScreen.remove(), 700);
  }, { once:true });
</script>

<script>
  const card = document.getElementById('card');
  const stage = document.querySelector('.stage');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if(!reduceMotion){
    stage.addEventListener('pointermove', (e)=>{
      const r = stage.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      const rotY = x * 8;
      const rotX = -y * 8;
      card.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
    });
    stage.addEventListener('pointerleave', ()=>{
      card.style.transform = 'rotateY(0deg) rotateX(0deg)';
    });
  }

  const copyBtn = document.getElementById('copyBtn');
  const copyTip = document.getElementById('copyTip');
  copyBtn.addEventListener('click', async ()=>{
    try{
      const current = (document.getElementById('handleText').textContent || '@deathy_dev').replace(/^@/, '');
      await navigator.clipboard.writeText(current);
    }catch(err){}
    copyTip.classList.add('show');
    setTimeout(()=> copyTip.classList.remove('show'), 1400);
  });
</script>

<script>
(function(){
  const DISCORD_ID = '1516311607184064586';
  const avatarImg = document.getElementById('avatarImg');
  const nameText  = document.getElementById('nameText');
  const handleText= document.getElementById('handleText');
  const statusDot = document.getElementById('statusDot');

  const STATUS_COLORS = {
    online:  'radial-gradient(circle at 35% 30%, #cdf3d8, #36c172 60%, #1e8e4f 100%)',
    idle:    'radial-gradient(circle at 35% 30%, #ffe9bd, #f2a93b 60%, #c97e12 100%)',
    dnd:     'radial-gradient(circle at 35% 30%, #ffc9c9, #ed4245 60%, #a82b2e 100%)',
    offline: 'radial-gradient(circle at 35% 30%, #d9dde3, #80848e 60%, #5b5e66 100%)'
  };

  fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`)
    .then(r => r.json())
    .then(res => {
      if(!res.success) return;
      const d = res.data;
      const u = d.discord_user;

      if(u.avatar){
        const ext = u.avatar.startsWith('a_') ? 'gif' : 'png';
        avatarImg.src = `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=256`;
      }

      const display = u.global_name || u.username;
      if(display) nameText.textContent = display;
      if(u.username) handleText.textContent = '@' + u.username;

      if(statusDot && STATUS_COLORS[d.discord_status]){
        statusDot.style.background = STATUS_COLORS[d.discord_status];
      }
    })
    .catch(()=>{});
})();
</script>

<script>
(function(){
  const canvas = document.getElementById('waterCanvas');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if(!gl) return;

  const SIM = 256;
  let A = new Float32Array(SIM * SIM);
  let B = new Float32Array(SIM * SIM);
  const DAMP = 0.985;

  function mkShader(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  function mkProg(vs, fs){
    const p = gl.createProgram();
    gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
    gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(p);
    return p;
  }

  const VS = `attribute vec2 a;varying vec2 v;void main(){v=a*.5+.5;gl_Position=vec4(a,0,1);}`;

  const FS = `
    precision highp float;
    uniform sampler2D uW;
    uniform vec2 uP;
    uniform vec3 uS;
    varying vec2 v;
    void main(){
      float C  = texture2D(uW,v).r*2.-1.;
      float L  = texture2D(uW,v+vec2(-uP.x,0.)).r*2.-1.;
      float R  = texture2D(uW,v+vec2( uP.x,0.)).r*2.-1.;
      float U  = texture2D(uW,v+vec2(0.,-uP.y)).r*2.-1.;
      float D  = texture2D(uW,v+vec2(0., uP.y)).r*2.-1.;
      float LL = texture2D(uW,v+vec2(-uP.x*2.,0.)).r*2.-1.;
      float RR = texture2D(uW,v+vec2( uP.x*2.,0.)).r*2.-1.;
      float UU = texture2D(uW,v+vec2(0.,-uP.y*2.)).r*2.-1.;
      float DD = texture2D(uW,v+vec2(0., uP.y*2.)).r*2.-1.;
      vec3 N = normalize(vec3((L-R)*9.+(LL-RR)*2., (U-D)*9.+(UU-DD)*2., 1.2));
      vec3 Vd = vec3(0.,0.,1.);
      vec3 H  = normalize(uS+Vd);
      float s128 = pow(max(dot(N,H),0.),256.);
      float s32  = pow(max(dot(N,H),0.),64.);
      float s8   = pow(max(dot(N,H),0.),16.);
      float lap  = L+R+U+D-4.*C;
      float caust = max(0.,-lap)*0.7;
      float fres  = pow(1.-max(dot(N,Vd),0.),5.);
      float peak  = smoothstep(.55,.95,C);
      float trough= smoothstep(-.55,-.9,C);
      vec3 col = vec3(0.);
      col += vec3(1.,.975,.85)*s128*5.0;
      col += vec3(.75,.9,1.)*s32*.5;
      col += vec3(.55,.78,1.)*s8*.1;
      col += vec3(.95,.98,1.)*caust*1.5;
      col += vec3(.25,.55,1.)*fres*.08;
      col += vec3(1.)*peak*.18;
      col += vec3(.1,.3,.6)*trough*.04;
      gl_FragColor = vec4(col,1.);
    }
  `;

  const prog = mkProg(VS, FS);
  const qBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, qBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  const texBuf = new Uint8Array(SIM * SIM * 4);

  const SUN = [0.45, 0.65, 0.62];
  const sm = Math.hypot(...SUN);
  SUN[0]/=sm; SUN[1]/=sm; SUN[2]/=sm;

  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

  function simulate(){
    for(let r=1;r<SIM-1;r++){
      for(let c=1;c<SIM-1;c++){
        const i=r*SIM+c;
        const n=(A[i-1]+A[i+1]+A[i-SIM]+A[i+SIM])*.5-B[i];
        B[i]=n*DAMP;
      }
    }
    const t=A; A=B; B=t;
  }

  function upload(){
    for(let i=0;i<SIM*SIM;i++){
      texBuf[i*4]=Math.max(0,Math.min(255,(A[i]*.5+.5)*255));
      texBuf[i*4+3]=255;
    }
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,SIM,SIM,0,gl.RGBA,gl.UNSIGNED_BYTE,texBuf);
  }

  function render(){
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.useProgram(prog);
    const aLoc=gl.getAttribLocation(prog,'a');
    gl.bindBuffer(gl.ARRAY_BUFFER,qBuf);
    gl.enableVertexAttribArray(aLoc);
    gl.vertexAttribPointer(aLoc,2,gl.FLOAT,false,0,0);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.uniform1i(gl.getUniformLocation(prog,'uW'),0);
    gl.uniform2f(gl.getUniformLocation(prog,'uP'),1/SIM,1/SIM);
    gl.uniform3fv(gl.getUniformLocation(prog,'uS'),SUN);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }

  function disturb(nx,ny,radius,strength){
    const cx=Math.floor(nx*SIM), cy=Math.floor(ny*SIM);
    const ir=Math.ceil(radius*SIM);
    for(let dy=-ir;dy<=ir;dy++){
      for(let dx=-ir;dx<=ir;dx++){
        const nc=cx+dx, nr=cy+dy;
        if(nc<=0||nc>=SIM-1||nr<=0||nr>=SIM-1) continue;
        const d=Math.sqrt(dx*dx+dy*dy)/ir;
        if(d>1) continue;
        A[nr*SIM+nc]+=strength*(1-d*d);
      }
    }
  }

  let lastMv=0;
  document.addEventListener('mousemove',e=>{
    const now=Date.now();
    if(now-lastMv<22) return;
    lastMv=now;
    disturb(e.clientX/innerWidth, e.clientY/innerHeight, 0.018, 0.55+Math.random()*.3);
  });

  document.addEventListener('touchmove',e=>{
    for(const t of e.touches) disturb(t.clientX/innerWidth,t.clientY/innerHeight,0.025,0.8);
  },{passive:true});

  (function autoRipple(){
    disturb(Math.random(),Math.random(),0.012+Math.random()*.025,0.35+Math.random()*.65);
    setTimeout(autoRipple,600+Math.random()*2600);
  })();

  function loop(){ simulate(); upload(); render(); requestAnimationFrame(loop); }
  window.addEventListener('resize',resize);
  resize();
  requestAnimationFrame(loop);

  function spawnRings(ox,oy){
    const sizes=[80,140,210];
    sizes.forEach((sz,i)=>{
      const r=document.createElement('div');
      r.className='tap-ring';
      r.style.cssText=`width:${sz}px;height:${sz}px;left:${ox}px;top:${oy}px;animation-delay:${i*0.12}s;`;
      document.body.appendChild(r);
      setTimeout(()=>r.remove(), 1300+i*120);
    });
  }

  const PCOLS=['rgba(180,220,255,','rgba(255,245,180,','rgba(255,255,255,','rgba(120,195,255,','rgba(255,228,120,'];
  function spawnParticles(ox,oy){
    const n=16+Math.floor(Math.random()*16);
    for(let i=0;i<n;i++){
      const p=document.createElement('div');
      p.className='particle';
      const sz=1.5+Math.random()*10;
      const col=PCOLS[Math.floor(Math.random()*PCOLS.length)];
      const ang=Math.random()*Math.PI*2;
      const spd=1.5+Math.random()*13;
      let vx=Math.cos(ang)*spd, vy=-(Math.abs(Math.sin(ang))*spd)-1.5;
      const life=450+Math.random()*750;
      p.style.cssText=`width:${sz}px;height:${sz}px;left:${ox}px;top:${oy}px;background:radial-gradient(circle at 32% 28%,#fff,${col}.95));box-shadow:0 0 ${sz*2.5}px ${col}.85)),0 0 ${sz*5}px ${col}.35));transform:translate(-50%,-50%);`;
      document.body.appendChild(p);
      const t0=performance.now();
      let cx=ox,cy=oy;
      (function tick(now){
        const pg=(now-t0)/life;
        if(pg>=1){p.remove();return;}
        vy+=0.42; cx+=vx*.62; cy+=vy*.62;
        p.style.left=cx+'px'; p.style.top=cy+'px';
        p.style.opacity=1-pg*pg;
        p.style.transform=`translate(-50%,-50%) scale(${1-pg*.65})`;
        requestAnimationFrame(tick);
      })(performance.now());
    }
  }
})();
</script>

</body>
</html>
