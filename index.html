<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>discord card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --space-deep:#03040a;
    --space-mid:#0a0e1f;
    --ink:#0a0a0c;
    --bone:#f7f7f5;
    --blurple:#5865F2;
    --signal:#23a55a;
    --idle:#f0b232;
    --dnd:#f23f43;
    --offline:#9398a1;
    --murk:#6b7080;
    --glass: rgba(10,10,14,0.78);
    --glass-border: rgba(255,255,255,0.14);
    --accent: var(--blurple);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:var(--space-deep);
    overflow:hidden;
    font-family:'Space Grotesk',sans-serif;
    color:#fff;
  }

  #space-canvas{
    position:fixed;inset:0;
    z-index:0;
    display:block;
    width:100%;height:100%;
    background: radial-gradient(ellipse at 30% 20%, #0d1230 0%, #03040a 55%, #000 100%);
  }
  #space-canvas canvas{
    display:block;
  }

  /* ============ LOADING / GATE ============ */
  #gate{
    position:fixed;inset:0;
    z-index:100;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    background:linear-gradient(135deg, #0d1230, #03040a, #1a0e2e, #03040a);
    background-size:300% 300%;
    animation: nebulaShift 14s ease infinite;
  }
  @keyframes nebulaShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
  #gate video{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 1.4s ease;
  }
  #gate.video-ready video{opacity:0.7;}
  #gate::before{
    content:'';
    position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(10,10,12,0.25) 0%, rgba(10,10,12,0.6) 65%, rgba(10,10,12,0.92) 100%);
    z-index:1;
  }
  #gate-content{
    position:relative;z-index:2;
    text-align:center;
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  .gate-eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:#bcbfc8;
    margin-bottom:18px;
    opacity:0;
    animation: fadeUp 0.8s ease forwards 0.3s;
  }
  .gate-enter{
    font-size:clamp(36px, 9vw, 72px);
    font-weight:700;
    letter-spacing:-0.03em;
    color:#ffffff;
    opacity:0;
    animation: fadeUp 0.8s ease forwards 0.5s;
    background:linear-gradient(90deg, #5865F2, #23a55a, #f0b232, #f23f43, #5865F2);
    background-size:300% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: fadeUp 0.8s ease forwards 0.5s, gradientShift 6s linear infinite;
  }
  @keyframes gradientShift{
    0%{background-position:0% 50%;}
    100%{background-position:300% 50%;}
  }
  .gate-sub{
    margin-top:14px;
    font-size:13px;
    color:#bcbfc8;
    font-family:'JetBrains Mono',monospace;
    opacity:0;
    animation: fadeUp 0.8s ease forwards 0.7s;
  }
  .pulse-ring{
    position:absolute;
    width:140px;height:140px;
    border:1px solid rgba(255,255,255,0.15);
    border-radius:50%;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
    animation: ringPulse 2.6s ease-out infinite;
    z-index:1;
    pointer-events:none;
  }
  .pulse-ring.delay{animation-delay:1.3s;}

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes ringPulse{
    0%{transform:translate(-50%,-50%) scale(0.6); opacity:0.5;}
    100%{transform:translate(-50%,-50%) scale(2.6); opacity:0;}
  }

  #gate.leaving{
    opacity:0;
    pointer-events:none;
    transition:opacity 0.7s ease;
  }

  .loader-bar{
    position:relative;z-index:2;
    width:160px;height:3px;
    background:rgba(255,255,255,0.15);
    margin:0 auto;
    margin-top:28px;
    overflow:hidden;
    border-radius:2px;
  }
  .loader-bar-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg, #5865F2, #23a55a);
    transition:width 0.2s ease;
  }

  /* ============ MAIN STAGE ============ */
  #stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    opacity:0;
    transition:opacity 0.9s ease;
  }
  #stage.visible{opacity:1;}

  #stage::before{ content:none; }

  /* ===== CARD ===== */
  .card{
    position:relative;z-index:2;
    width:390px;
    background:var(--glass);
    border:1.5px solid var(--glass-border);
    border-radius:22px;
    backdrop-filter:blur(24px);
    padding:30px;
    box-shadow:
      0 40px 90px -25px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 0 70px -10px var(--glow-color, rgba(88,101,242,0.35));
    transition: box-shadow 0.6s ease;
  }
  .card.glow-online{ --glow-color: rgba(35,165,90,0.45); }
  .card.glow-idle{ --glow-color: rgba(240,178,50,0.45); }
  .card.glow-dnd{ --glow-color: rgba(242,63,67,0.45); }
  .card.glow-offline{ --glow-color: rgba(147,152,161,0.3); }

  .card-top{
    display:flex;
    gap:16px;
    align-items:flex-start;
  }

  .avatar-wrap{
    position:relative;
    width:68px;height:68px;
    flex-shrink:0;
  }
  .avatar-wrap img{
    width:100%;height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
    background:#1a1a1d;
    border:2px solid rgba(255,255,255,0.12);
  }
  .status-dot{
    position:absolute;
    width:19px;height:19px;
    border-radius:50%;
    bottom:-2px;right:-2px;
    border:4px solid var(--ink);
    background:var(--offline);
    transition:background 0.4s ease;
    box-shadow:0 0 0 0 transparent;
  }
  .status-dot.online{background:var(--signal); animation: dotPulse 2.2s ease-in-out infinite;}
  .status-dot.idle{background:var(--idle);}
  .status-dot.dnd{background:var(--dnd);}
  @keyframes dotPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(35,165,90,0.5);}
    50%{box-shadow:0 0 0 6px rgba(35,165,90,0);}
  }

  .id-block{
    padding-top:2px;
    min-width:0;
  }
  .display-name{
    font-size:21px;
    font-weight:700;
    letter-spacing:-0.01em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:#ffffff;
  }
  .username{
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    color:#9398a1;
    margin-top:3px;
  }
  .status-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#9398a1;
    margin-top:9px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .status-label .dot-inline{
    width:6px;height:6px;border-radius:50%;
    background:var(--offline);
  }

  .divider{
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.12) 15%, rgba(255,255,255,0.12) 85%, transparent);
    margin:22px 0;
  }

  /* ===== SPOTIFY ===== */
  .block-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:#7a7f8c;
    margin-bottom:10px;
  }
  .spotify-row{
    display:flex;
    gap:12px;
  }
  .spotify-art{
    width:54px;height:54px;
    border-radius:7px;
    object-fit:cover;
    flex-shrink:0;
    background:#1a1a1d;
  }
  .spotify-meta{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:3px;
  }
  .spotify-track{
    font-size:14px;
    font-weight:700;
    color:#ffffff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .spotify-artist{
    font-size:12px;
    color:#9398a1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .spotify-progress{
    margin-top:7px;
    height:4px;
    width:100%;
    background:rgba(255,255,255,0.1);
    border-radius:3px;
    overflow:hidden;
  }
  .spotify-progress-fill{
    height:100%;
    width:0%;
    background:var(--signal);
    border-radius:3px;
  }
  .spotify-time{
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    color:#7a7f8c;
    margin-top:5px;
  }

  /* ===== ACTIVITY ===== */
  .activity-row{
    display:flex;
    gap:12px;
  }
  .activity-art{
    width:54px;height:54px;
    border-radius:9px;
    object-fit:cover;
    flex-shrink:0;
    background:#1a1a1d;
  }
  .activity-meta{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:2px;
  }
  .activity-name{
    font-size:14px;
    font-weight:700;
    color:#ffffff;
  }
  .activity-detail{
    font-size:12px;
    color:#9398a1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .activity-elapsed{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:#7a7f8c;
    margin-top:4px;
  }

  .empty-state{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    color:#7a7f8c;
    padding:6px 0;
  }

  .card-footer{
    margin-top:22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .live-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    letter-spacing:0.15em;
    color:#7a7f8c;
    display:flex;align-items:center;gap:5px;
  }
  .live-tag .led{
    width:5px;height:5px;border-radius:50%;
    background:var(--signal);
    box-shadow:0 0 6px var(--signal);
  }

  /* ===== MUSIC TOGGLE ===== */
  #music-toggle{
    position:fixed;
    bottom:24px;right:24px;
    z-index:50;
    width:48px;height:48px;
    border-radius:50%;
    background:var(--ink);
    border:1.5px solid rgba(255,255,255,0.12);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform 0.2s ease, border-color 0.2s ease, box-shadow 0.3s ease;
    box-shadow: 0 12px 30px -8px rgba(0,0,0,0.35);
  }
  #music-toggle:hover{
    transform:scale(1.08);
    border-color:rgba(255,255,255,0.25);
  }
  #music-toggle svg{width:19px;height:19px;fill:#ffffff;}
  #music-toggle.muted svg{fill:#9398a1;}

  #yt-frame-wrap{
    position:fixed;
    width:1px;height:1px;
    overflow:hidden;
    opacity:0;
    pointer-events:none;
    bottom:0;right:0;
  }

  @media (max-width:480px){
    .card{width:90vw;padding:22px;}
  }

  @media (prefers-reduced-motion: reduce){
    .status-dot.online{animation:none;}
    .pulse-ring{animation:none;display:none;}
  }
</style>
</head>
<body>

<!-- ============ LOADING GATE ============ -->
<div id="gate">
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://files.catbox.moe/1t2yiz.mp4" type="video/mp4">
  </video>
  <div class="pulse-ring"></div>
  <div class="pulse-ring delay"></div>
  <div id="gate-content">
    <div class="gate-enter">click to enter</div>
    <div class="loader-bar"><div class="loader-bar-fill" id="loader-fill"></div></div>
    <div class="gate-sub" id="gate-sub">loading feed</div>
  </div>
</div>

<!-- ============ MAIN STAGE ============ -->
<div id="space-canvas"></div>
<div id="stage">
  <div class="card glow-offline" id="card">
    <div class="card-top">
      <div class="avatar-wrap">
        <img id="avatar-img" src="" alt="avatar">
        <div class="status-dot" id="status-dot"></div>
      </div>
      <div class="id-block">
        <div class="display-name" id="display-name">loading</div>
        <div class="username" id="username">@—</div>
        <div class="status-label" id="status-label"><span class="dot-inline"></span><span id="status-text">connecting</span></div>
      </div>
    </div>

    <div id="spotify-section">
      <div class="divider"></div>
      <div class="block-label">spotify</div>
      <div id="spotify-content"><div class="empty-state">not listening to anything right now</div></div>
    </div>

    <div id="activity-section">
      <div class="divider"></div>
      <div class="block-label">activity</div>
      <div id="activity-content"><div class="empty-state">no activity detected</div></div>
    </div>

    <div class="card-footer">
      <div class="live-tag"><span class="led"></span>live via lanyard</div>
    </div>
  </div>
</div>

<!-- ============ MUSIC ============ -->
<div id="music-toggle" class="muted" title="play music">
  <svg id="music-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
</div>
<div id="yt-frame-wrap">
  <iframe id="yt-frame"
    src=""
    allow="autoplay; encrypted-media"
    frameborder="0">
  </iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.128.0/three.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const DISCORD_ID = "1516311607184064586";
  const YT_VIDEO_ID = "8GW6sLrK40k";

  /* ---------- THREE.JS SPACE SCENE ---------- */
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const container = document.getElementById('space-canvas');

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
  camera.position.set(0, 0, 60);

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x03040a, 1);
  container.appendChild(renderer.domElement);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ambient + key light */
  scene.add(new THREE.AmbientLight(0x404060, 1.1));
  const keyLight = new THREE.PointLight(0xffffff, 1.4, 400);
  keyLight.position.set(40, 30, 80);
  scene.add(keyLight);

  /* ---- background nebula glow sprites ---- */
  function makeGlowSprite(color, size, opacity){
    const c = document.createElement('canvas');
    c.width = c.height = 128;
    const cx = c.getContext('2d');
    const g = cx.createRadialGradient(64,64,0,64,64,64);
    g.addColorStop(0, color);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = g;
    cx.fillRect(0,0,128,128);
    const tex = new THREE.CanvasTexture(c);
    const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, opacity, blending:THREE.AdditiveBlending, depthWrite:false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(size,size,1);
    return sprite;
  }

  const nebula1 = makeGlowSprite('rgba(88,101,242,0.9)', 220, 0.5);
  nebula1.position.set(-60,30,-150);
  scene.add(nebula1);
  const nebula2 = makeGlowSprite('rgba(240,178,50,0.8)', 180, 0.4);
  nebula2.position.set(70,-30,-160);
  scene.add(nebula2);

  /* ---- starfield ---- */
  function makeStarfield(count, spread, size, color){
    const positions = new Float32Array(count*3);
    for(let i=0;i<count;i++){
      positions[i*3] = (Math.random()-0.5)*spread;
      positions[i*3+1] = (Math.random()-0.5)*spread;
      positions[i*3+2] = (Math.random()-0.5)*spread - 50;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
    const mat = new THREE.PointsMaterial({ color, size, transparent:true, opacity:0.9, sizeAttenuation:true });
    return new THREE.Points(geo, mat);
  }
  const starsFar = makeStarfield(1400, 900, 0.7, 0xffffff);
  const starsNear = makeStarfield(500, 500, 1.1, 0xcfe0ff);
  scene.add(starsFar, starsNear);

  /* ---- planets ---- */
  function makePlanet({ x,y,z, r, color, emissive, ring }){
    const geo = new THREE.SphereGeometry(r, 48, 48);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive, emissiveIntensity:0.35, roughness:0.55, metalness:0.25
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x,y,z);
    const group = new THREE.Group();
    group.add(mesh);

    const glow = makeGlowSprite(`rgba(${(color>>16&255)},${(color>>8&255)},${(color&255)},0.55)`, r*5, 0.55);
    glow.position.set(x,y,z);
    scene.add(glow);

    if(ring){
      const ringGeo = new THREE.RingGeometry(r*1.5, r*2.1, 64);
      const ringMat = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.3, side:THREE.DoubleSide });
      const ringMesh = new THREE.Mesh(ringGeo, ringMat);
      ringMesh.rotation.x = Math.PI/2.3;
      mesh.add(ringMesh);
    }
    scene.add(group);
    return { group, mesh, baseX:x, baseY:y, baseZ:z, glow };
  }

  const planets = [
    makePlanet({ x:-34, y:14, z:-60, r:7, color:0x5865F2, emissive:0x2233aa, ring:false }),
    makePlanet({ x:38, y:-10, z:-90, r:11, color:0xf0b232, emissive:0x8a5a10, ring:true }),
    makePlanet({ x:24, y:20, z:-40, r:4, color:0xf23f43, emissive:0x8a1015, ring:false }),
  ];

  /* ---- ship (low-poly hull) ---- */
  function buildShip(){
    const group = new THREE.Group();
    const hullGeo = new THREE.ConeGeometry(2.4, 8, 8);
    hullGeo.rotateZ(-Math.PI/2);
    const hullMat = new THREE.MeshStandardMaterial({ color:0xe9ecf7, metalness:0.6, roughness:0.3, emissive:0x5865F2, emissiveIntensity:0.15 });
    const hull = new THREE.Mesh(hullGeo, hullMat);
    group.add(hull);

    const finGeo = new THREE.BoxGeometry(2.2,0.3,2.6);
    const finMat = new THREE.MeshStandardMaterial({ color:0x5865F2, metalness:0.4, roughness:0.4 });
    const fin1 = new THREE.Mesh(finGeo, finMat); fin1.position.set(-2.6,0,0); group.add(fin1);

    const engineGlow = makeGlowSprite('rgba(120,170,255,0.95)', 7, 0.9);
    engineGlow.position.set(-5,0,0);
    group.add(engineGlow);

    return group;
  }

  /* ---- meteor (rocky icosahedron) ---- */
  function buildMeteor(){
    const geo = new THREE.IcosahedronGeometry(2.6, 1);
    const posAttr = geo.attributes.position;
    for(let i=0;i<posAttr.count;i++){
      const v = new THREE.Vector3().fromBufferAttribute(posAttr,i);
      v.multiplyScalar(1 + (Math.random()-0.5)*0.35);
      posAttr.setXYZ(i, v.x, v.y, v.z);
    }
    geo.computeVertexNormals();
    const mat = new THREE.MeshStandardMaterial({ color:0x6b4a36, roughness:0.95, metalness:0.05, emissive:0x2a1810, emissiveIntensity:0.3 });
    return new THREE.Mesh(geo, mat);
  }

  /* ---- explosion particle system ---- */
  const MAX_PARTICLES = 200;
  const explGeo = new THREE.BufferGeometry();
  const explPositions = new Float32Array(MAX_PARTICLES*3);
  const explColors = new Float32Array(MAX_PARTICLES*3);
  explGeo.setAttribute('position', new THREE.BufferAttribute(explPositions,3));
  explGeo.setAttribute('color', new THREE.BufferAttribute(explColors,3));
  const explMat = new THREE.PointsMaterial({ size:1.4, vertexColors:true, transparent:true, opacity:1, blending:THREE.AdditiveBlending, depthWrite:false });
  const explPoints = new THREE.Points(explGeo, explMat);
  explPoints.visible = false;
  scene.add(explPoints);

  let particleVel = [];
  let particleLife = [];
  let particlesActive = false;

  function spawnExplosion(pos){
    particlesActive = true;
    explPoints.visible = true;
    particleVel = [];
    particleLife = [];
    const colorChoices = [
      [1,0.82,0.4],[0.95,0.25,0.27],[1,0.55,0.26],[1,1,1],[0.35,0.4,0.95]
    ];
    for(let i=0;i<MAX_PARTICLES;i++){
      explPositions[i*3] = pos.x;
      explPositions[i*3+1] = pos.y;
      explPositions[i*3+2] = pos.z;
      const dir = new THREE.Vector3((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)).normalize();
      const speed = 0.4 + Math.random()*1.6;
      particleVel.push(dir.multiplyScalar(speed));
      particleLife.push(1);
      const c = colorChoices[Math.floor(Math.random()*colorChoices.length)];
      explColors[i*3]=c[0]; explColors[i*3+1]=c[1]; explColors[i*3+2]=c[2];
    }
    explGeo.attributes.position.needsUpdate = true;
    explGeo.attributes.color.needsUpdate = true;
  }

  function updateExplosion(){
    if(!particlesActive) return;
    let anyAlive = false;
    for(let i=0;i<MAX_PARTICLES;i++){
      if(particleLife[i] > 0){
        anyAlive = true;
        explPositions[i*3] += particleVel[i].x;
        explPositions[i*3+1] += particleVel[i].y;
        explPositions[i*3+2] += particleVel[i].z;
        particleVel[i].multiplyScalar(0.96);
        particleLife[i] -= 0.018;
      }
    }
    explGeo.attributes.position.needsUpdate = true;
    explMat.opacity = Math.max(...particleLife, 0);
    if(!anyAlive){
      particlesActive = false;
      explPoints.visible = false;
    }
  }

  /* ---- collision event system ---- */
  const ship = buildShip();
  const meteor = buildMeteor();
  ship.visible = false;
  meteor.visible = false;
  scene.add(ship, meteor);

  const flashLight = new THREE.PointLight(0xffaa55, 0, 300);
  scene.add(flashLight);

  let event = null;
  const EVENT_CYCLE = 9000;
  let lastEventTime = -7000;
  const clock = new THREE.Clock();

  function spawnEvent(){
    const fromLeft = Math.random() > 0.5;
    const y1 = (Math.random()-0.5)*22;
    const y2 = (Math.random()-0.5)*22;
    const z = -20 - Math.random()*15;
    event = {
      shipPos: new THREE.Vector3(fromLeft ? -70 : 70, y1, z),
      shipDir: fromLeft ? 1 : -1,
      meteorPos: new THREE.Vector3(fromLeft ? 70 : -70, y2, z),
      meteorDir: fromLeft ? -1 : 1,
      collided:false,
      collideAt:0
    };
    ship.visible = true;
    meteor.visible = true;
    ship.rotation.y = fromLeft ? 0 : Math.PI;
  }

  function updateEvent(now, dt){
    if(!event && now - lastEventTime > EVENT_CYCLE){
      spawnEvent();
      lastEventTime = now;
    }
    if(!event) return;

    if(!event.collided){
      const speed = 38 * dt;
      event.shipPos.x += event.shipDir * speed;
      event.meteorPos.x += event.meteorDir * speed * 0.8;
      ship.position.copy(event.shipPos);
      meteor.position.copy(event.meteorPos);
      meteor.rotation.x += dt*1.4;
      meteor.rotation.y += dt*1.1;

      const dist = event.shipPos.distanceTo(event.meteorPos);
      if(dist < 6 && Math.abs(event.shipPos.x) < 30){
        event.collided = true;
        event.collideAt = now;
        const mid = event.shipPos.clone().add(event.meteorPos).multiplyScalar(0.5);
        spawnExplosion(mid);
        flashLight.position.copy(mid);
        flashLight.intensity = 6;
        ship.visible = false;
        meteor.visible = false;
      } else if(Math.abs(event.shipPos.x) > 90){
        event = null;
        ship.visible = false;
        meteor.visible = false;
      }
    } else {
      const elapsed = now - event.collideAt;
      flashLight.intensity = Math.max(6 * (1 - elapsed/300), 0);
      if(elapsed > 1600 && !particlesActive){
        event = null;
      }
    }
  }

  /* ---- mouse parallax ---- */
  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5);
    mouseY = (e.clientY / window.innerHeight - 0.5);
  });

  function animate(){
    const t = clock.getElapsedTime();
    const dt = Math.min(clock.getDelta(), 0.05);

    starsFar.rotation.y = t*0.004;
    starsNear.rotation.y = t*0.008;

    planets.forEach((p,i) => {
      p.group.position.x = p.baseX + Math.sin(t*0.08 + i)*3;
      p.group.position.y = p.baseY + Math.cos(t*0.06 + i)*2;
      p.mesh.rotation.y = t*0.1 + i;
      p.glow.position.copy(p.group.position).add(new THREE.Vector3(p.baseX,p.baseY,p.baseZ).sub(new THREE.Vector3(p.baseX,p.baseY,p.baseZ)));
      p.glow.position.set(p.group.position.x, p.group.position.y, p.baseZ);
    });

    camera.position.x += (mouseX*6 - camera.position.x)*0.02;
    camera.position.y += (-mouseY*4 - camera.position.y)*0.02;
    camera.lookAt(0,0,-40);

    updateEvent(performance.now(), dt);
    updateExplosion();

    renderer.render(scene, camera);
    if(!reduceMotion) requestAnimationFrame(animate);
  }

  if(reduceMotion){
    renderer.render(scene, camera);
  } else {
    requestAnimationFrame(animate);
  }
  const gate = document.getElementById('gate');
  const stage = document.getElementById('stage');
  const loaderFill = document.getElementById('loader-fill');
  const gateSub = document.getElementById('gate-sub');
  const bgVideo = document.getElementById('bg-video');

  bgVideo.addEventListener('loadeddata', () => gate.classList.add('video-ready'));
  bgVideo.addEventListener('error', () => {
    gateSub.textContent = 'background unavailable — entering anyway';
  });
  bgVideo.load();

  let pct = 0;
  const fakeProgress = setInterval(() => {
    pct = Math.min(pct + Math.random()*18, 92);
    loaderFill.style.width = pct + '%';
  }, 220);

  let lanyardReady = false;
  let entered = false;

  function tryFinishLoad(){
    if(lanyardReady){
      clearInterval(fakeProgress);
      loaderFill.style.width = '100%';
      gateSub.textContent = 'ready';
    }
  }

  gate.addEventListener('click', () => {
    if(entered) return;
    entered = true;
    gate.classList.add('leaving');
    stage.classList.add('visible');
    setTimeout(() => { gate.style.display='none'; }, 750);
    startMusic();
  });

  /* ---------- LANYARD ---------- */
  const statusMap = {
    online: {cls:'online', label:'online'},
    idle: {cls:'idle', label:'idle'},
    dnd: {cls:'dnd', label:'do not disturb'},
    offline: {cls:'', label:'offline'}
  };

  function fmtTime(ms){
    const totalSec = Math.floor(ms/1000);
    const m = Math.floor(totalSec/60);
    const s = totalSec % 60;
    return `${m}:${s.toString().padStart(2,'0')}`;
  }

  function renderUser(data){
    const discordUser = data.discord_user;
    const avatarUrl = discordUser.avatar
      ? `https://cdn.discordapp.com/avatars/${discordUser.id}/${discordUser.avatar}.png?size=128`
      : `https://cdn.discordapp.com/embed/avatars/0.png`;
    document.getElementById('avatar-img').src = avatarUrl;
    document.getElementById('display-name').textContent = discordUser.global_name || discordUser.username;
    document.getElementById('username').textContent = '@' + discordUser.username;

    const st = statusMap[data.discord_status] || statusMap.offline;
    const dot = document.getElementById('status-dot');
    dot.className = 'status-dot ' + st.cls;
    document.querySelector('.dot-inline').style.background = getComputedStyle(dot).backgroundColor;
    document.getElementById('status-text').textContent = st.label;

    const cardEl = document.getElementById('card');
    cardEl.className = 'card glow-' + (st.cls || 'offline');

    /* Spotify */
    const spotifyContent = document.getElementById('spotify-content');
    if(data.listening_to_spotify && data.spotify){
      const sp = data.spotify;
      const now = Date.now();
      const total = sp.timestamps.end - sp.timestamps.start;
      const elapsed = Math.min(Math.max(now - sp.timestamps.start, 0), total);
      const pctPlayed = (elapsed/total)*100;
      spotifyContent.innerHTML = `
        <div class="spotify-row">
          <img class="spotify-art" src="${sp.album_art_url}" alt="album art">
          <div class="spotify-meta">
            <div class="spotify-track">${escapeHtml(sp.song)}</div>
            <div class="spotify-artist">${escapeHtml(sp.artist)}</div>
          </div>
        </div>
        <div class="spotify-progress"><div class="spotify-progress-fill" id="sp-fill" style="width:${pctPlayed}%"></div></div>
        <div class="spotify-time"><span id="sp-elapsed">${fmtTime(elapsed)}</span><span>${fmtTime(total)}</span></div>
      `;
      window._spotifyTimestamps = sp.timestamps;
    } else {
      spotifyContent.innerHTML = `<div class="empty-state">not listening to anything right now</div>`;
      window._spotifyTimestamps = null;
    }

    /* Activity (exclude spotify & custom status, show first real game/app activity) */
    const activityContent = document.getElementById('activity-content');
    const realActivities = (data.activities || []).filter(a => a.type === 0 || a.type === 2 || a.type === 3);
    if(realActivities.length > 0){
      const act = realActivities[0];
      let art = null;
      if(act.assets && act.assets.large_image){
        const img = act.assets.large_image;
        if(img.startsWith('mp:')){
          art = `https://media.discordapp.net/${img.replace('mp:','')}`;
        } else if(img.startsWith('spotify:')){
          art = img.replace('spotify:', 'https://i.scdn.co/image/');
        } else {
          art = `https://cdn.discordapp.com/app-assets/${act.application_id}/${img}.png`;
        }
      }
      const elapsedStr = act.timestamps && act.timestamps.start
        ? fmtTime(Date.now() - act.timestamps.start) + ' elapsed'
        : '';
      activityContent.innerHTML = `
        <div class="activity-row">
          ${art ? `<img class="activity-art" src="${art}" alt="activity art">` : ''}
          <div class="activity-meta">
            <div class="activity-name">${escapeHtml(act.name)}</div>
            ${act.details ? `<div class="activity-detail">${escapeHtml(act.details)}</div>` : ''}
            ${act.state ? `<div class="activity-detail">${escapeHtml(act.state)}</div>` : ''}
            ${elapsedStr ? `<div class="activity-elapsed">${elapsedStr}</div>` : ''}
          </div>
        </div>
      `;
    } else {
      activityContent.innerHTML = `<div class="empty-state">no activity detected</div>`;
    }

    lanyardReady = true;
    tryFinishLoad();
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  async function fetchLanyard(){
    try{
      const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      const json = await res.json();
      if(json.success){
        renderUser(json.data);
      } else {
        document.getElementById('display-name').textContent = 'user not found';
        document.getElementById('username').textContent = 'lanyard has no data for this id';
        lanyardReady = true;
        tryFinishLoad();
      }
    }catch(e){
      document.getElementById('display-name').textContent = 'connection failed';
      lanyardReady = true;
      tryFinishLoad();
    }
  }

  fetchLanyard();
  setInterval(fetchLanyard, 15000);

  /* live progress bar tick between fetches */
  setInterval(() => {
    if(window._spotifyTimestamps){
      const {start, end} = window._spotifyTimestamps;
      const now = Date.now();
      const total = end - start;
      const elapsed = Math.min(Math.max(now - start, 0), total);
      const fill = document.getElementById('sp-fill');
      const elapsedEl = document.getElementById('sp-elapsed');
      if(fill) fill.style.width = (elapsed/total*100) + '%';
      if(elapsedEl) elapsedEl.textContent = fmtTime(elapsed);
    }
  }, 1000);

  /* Try via WebSocket too for instant updates (optional upgrade, falls back fine to polling above) */
  try{
    const ws = new WebSocket('wss://api.lanyard.rest/socket');
    ws.onopen = () => {
      ws.send(JSON.stringify({op:2, d:{subscribe_to_id: DISCORD_ID}}));
    };
    ws.onmessage = (msg) => {
      const payload = JSON.parse(msg.data);
      if(payload.op === 0 && payload.t === 'INIT_STATE'){
        renderUser(payload.d);
      }
      if(payload.op === 0 && payload.t === 'PRESENCE_UPDATE'){
        renderUser(payload.d);
      }
      if(payload.op === 1 && payload.d && payload.d.heartbeat_interval){
        setInterval(() => { ws.send(JSON.stringify({op:3})); }, payload.d.heartbeat_interval);
      }
    };
  }catch(e){ /* fallback to polling already running */ }

  /* ---------- MUSIC ---------- */
  let ytPlayer = null;
  let playerReady = false;
  let musicStarted = false;
  let isMuted = true;

  function onYouTubeIframeAPIReady(){
    ytPlayer = new YT.Player('yt-frame', {
      videoId: YT_VIDEO_ID,
      playerVars: {
        autoplay: 0,
        loop: 1,
        playlist: YT_VIDEO_ID,
        controls: 0
      },
      events: {
        onReady: () => { playerReady = true; }
      }
    });
  }

  function startMusic(){
    if(!playerReady){
      setTimeout(startMusic, 400);
      return;
    }
    if(!musicStarted){
      musicStarted = true;
      ytPlayer.playVideo();
      isMuted = false;
      updateMusicIcon();
    }
  }

  function updateMusicIcon(){
    const btn = document.getElementById('music-toggle');
    const icon = document.getElementById('music-icon');
    if(isMuted){
      btn.classList.add('muted');
      icon.innerHTML = '<path d="M16.5 12A4.5 4.5 0 0014 8v1.79l2.45 2.45c.03-.24.05-.49.05-.74zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.96 8.96 0 0021 12c0-4.28-3-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27l6.01 6.01L9 10v4c0 1.66 1.34 3 3 3 .23 0 .45-.03.66-.08l1.6 1.6c-.71.33-1.5.52-2.26.52-2.76 0-5-2.24-5-5H4c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c.78-.12 1.51-.39 2.17-.78L17.73 21 19 19.73 4.27 3z"/>';
    } else {
      btn.classList.remove('muted');
      icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
    }
  }

  document.getElementById('music-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    if(!playerReady) return;
    if(!musicStarted){
      startMusic();
      return;
    }
    isMuted = !isMuted;
    if(isMuted){
      ytPlayer.mute();
    } else {
      ytPlayer.unMute();
    }
    updateMusicIcon();
  });
</script>
</body>
</html>
