<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>orbit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#050508;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* ── BG CANVAS ── */
canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* ── SCENE / 3D WRAPPER ── */
.scene{position:relative;z-index:10;perspective:1200px;}
.wrap{transform-style:preserve-3d;will-change:transform;transition:transform .05s linear;}

/* ── CARD ── */
.card{
  width:330px;
  border-radius:22px;
  background:#fff;
  box-shadow:
    0 2px 0 #d0d0d8,
    0 8px 16px rgba(80,80,180,0.08),
    0 30px 60px rgba(0,0,0,0.6),
    0 70px 140px rgba(0,0,0,0.35),
    0 0 0 1px rgba(255,255,255,0.07);
  overflow:hidden;
  transform-style:preserve-3d;
  position:relative;
}

/* Holographic sheen layer */
.card::before{
  content:'';
  position:absolute;inset:0;z-index:99;
  border-radius:22px;
  pointer-events:none;
  background:linear-gradient(
    115deg,
    transparent 0%,
    rgba(125,211,252,0.06) 30%,
    rgba(192,132,252,0.06) 55%,
    transparent 80%
  );
  opacity:0;
  transition:opacity .3s;
}
.card:hover::before{opacity:1;}

/* ── BANNER ── */
.banner{
  width:100%;height:110px;
  position:relative;overflow:hidden;
  background:#0a0010;
}
.banner img{
  width:100%;height:100%;
  object-fit:cover;object-position:center 20%;
  display:block;
  filter:brightness(0.82) saturate(1.1);
}
/* subtle vignette on banner */
.banner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 55%,rgba(255,255,255,0.95) 100%);
  pointer-events:none;
}

/* ── AVATAR ── */
.av-wrap{position:absolute;left:16px;top:65px;z-index:20;}
.av-ring{
  width:76px;height:76px;border-radius:50%;
  padding:3px;
  background:linear-gradient(135deg,#7DD3FC,#C084FC);
  box-shadow:0 4px 24px rgba(125,211,252,0.35),0 2px 8px rgba(0,0,0,0.4);
}
.av-ring img{
  width:100%;height:100%;border-radius:50%;
  object-fit:cover;object-position:center top;
  display:block;border:2px solid #fff;
}
/* avatar placeholder when no img */
.av-ph{
  width:100%;height:100%;border-radius:50%;
  background:linear-gradient(135deg,#0f0f1a,#1a1a2e);
  border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;
  color:#7DD3FC;font-size:22px;font-weight:800;
}
.sdot{
  position:absolute;bottom:4px;right:4px;
  width:14px;height:14px;border-radius:50%;
  background:#6b7280;border:3px solid #fff;
  transition:background .4s,box-shadow .4s;
  box-shadow:0 0 0 rgba(0,0,0,0);
}
.sdot.online{background:#22c55e;box-shadow:0 0 7px rgba(34,197,94,0.7);}
.sdot.idle  {background:#f59e0b;box-shadow:0 0 7px rgba(245,158,11,0.7);animation:pulse 2s infinite;}
.sdot.dnd   {background:#ef4444;box-shadow:0 0 7px rgba(239,68,68,0.7);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ── WHITE BODY ── */
.body{background:#fff;padding:8px 16px 0;margin-top:44px;}
.name{font-size:18px;font-weight:800;color:#0a0a0a;letter-spacing:-0.035em;}
.handle{font-size:11px;color:#9ca3af;font-weight:400;margin-top:2px;letter-spacing:.01em;}
.divline{height:1px;background:linear-gradient(90deg,transparent,#e0e0e8 30%,#e0e0e8 70%,transparent);margin:12px 0;}

/* ── DARK SECTION ── */
.dark{
  background:linear-gradient(180deg,#0a0a12 0%,#0f0f1a 100%);
  margin:0 -16px;
  padding:14px 16px 16px;
  border-top:1px solid #e8e8ef;
}
.act-label{
  font-size:9px;font-weight:700;color:#3a3a4a;
  letter-spacing:.16em;text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:7px;
}
.dot-blink{
  width:5px;height:5px;border-radius:50%;
  background:#7DD3FC;display:inline-block;
  box-shadow:0 0 5px #7DD3FC;
  animation:blink 1.8s infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.1;}}

/* ── SPOTIFY ROW ── */
.sp-row{display:flex;align-items:center;gap:10px;}
.alb{
  width:44px;height:44px;border-radius:7px;
  object-fit:cover;flex-shrink:0;
  box-shadow:0 3px 14px rgba(0,0,0,0.7);
}
.alb-ph{
  width:44px;height:44px;border-radius:7px;
  background:#111122;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.alb-ph img{width:100%;height:100%;object-fit:cover;}
.tk{flex:1;min-width:0;}
.tk-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tk-art {font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.prog{margin-top:9px;height:2px;background:#1a1a2a;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#7DD3FC,#C084FC);border-radius:2px;animation:prog 210s linear infinite;}
@keyframes prog{from{width:2%;}to{width:100%;}}

/* fallback spotify static display */
.sp-static .alb-ph{background:#111122;}

/* ── GAME ROW ── */
.gm-row{display:flex;align-items:center;gap:10px;}
.gm-ico{
  width:44px;height:44px;border-radius:9px;
  background:#0f0f1a;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
  border:1px solid #1a1a2e;overflow:hidden;
}
.gm-ico img{width:100%;height:100%;object-fit:cover;}
.gm-name{font-size:12px;font-weight:600;color:#fff;}
.gm-det{font-size:11px;color:#555;margin-top:2px;}
.no-act{font-size:10px;color:#2a2a3a;text-align:center;padding:10px 0;letter-spacing:.1em;}

/* ── STATIC SPOTIFY DISPLAY (always visible below activity) ── */
.sp-embed-wrap{
  margin-top:12px;
  border-top:1px solid #151525;
  padding-top:12px;
}
.sp-embed-label{
  font-size:9px;font-weight:700;color:#3a3a4a;
  letter-spacing:.16em;text-transform:uppercase;
  margin-bottom:9px;display:flex;align-items:center;gap:7px;
}
.sp-embed-icon{width:16px;height:16px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.sp-embed-icon img{width:100%;height:100%;object-fit:cover;}
.sp-static-row{display:flex;align-items:center;gap:10px;}
.sp-static-art{
  width:44px;height:44px;border-radius:7px;
  background:#111122;overflow:hidden;flex-shrink:0;
  box-shadow:0 3px 14px rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
}
.sp-static-art img{width:100%;height:100%;object-fit:cover;}
.sp-bar-wrap{margin-top:9px;position:relative;}
.sp-bar-bg{height:2px;background:#1a1a2a;border-radius:2px;overflow:hidden;}
.sp-bar-fill{height:100%;background:linear-gradient(90deg,#7DD3FC,#C084FC);border-radius:2px;animation:prog 238s linear infinite;}

/* waveform bars */
.wave{display:flex;align-items:flex-end;gap:2px;height:16px;margin-left:auto;}
.wave span{
  width:3px;border-radius:2px;
  background:linear-gradient(to top,#7DD3FC,#C084FC);
}
.wave span:nth-child(1){animation:bar 0.9s 0.0s infinite ease-in-out alternate;}
.wave span:nth-child(2){animation:bar 0.9s 0.15s infinite ease-in-out alternate;}
.wave span:nth-child(3){animation:bar 0.9s 0.3s infinite ease-in-out alternate;}
.wave span:nth-child(4){animation:bar 0.9s 0.1s infinite ease-in-out alternate;}
.wave span:nth-child(5){animation:bar 0.9s 0.25s infinite ease-in-out alternate;}
@keyframes bar{from{height:3px;}to{height:14px;}}

/* ── LINKS ── */
.links{display:flex;gap:6px;margin-top:14px;padding-bottom:16px;}
.lnk{
  flex:1;padding:9px 0;border-radius:9px;
  background:transparent;border:1px solid #1a1a2a;
  color:#3a3a4a;font-size:9px;font-weight:700;
  letter-spacing:.1em;text-align:center;
  text-transform:uppercase;cursor:pointer;
  transition:all .25s;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
  font-family:inherit;
}
.lnk:hover{
  border-color:#7DD3FC;color:#7DD3FC;
  background:rgba(125,211,252,0.05);
  box-shadow:0 0 12px rgba(125,211,252,0.12);
}
.lnk img{width:14px;height:14px;object-fit:contain;border-radius:3px;}

/* ── 3D DEPTH SHADOW (behind card) ── */
.card-shadow{
  position:absolute;
  inset:20px;bottom:-30px;
  border-radius:22px;
  background:rgba(80,80,200,0.12);
  filter:blur(28px);
  z-index:-1;
  transform:translateZ(-40px);
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="scene">
  <div class="wrap" id="wrap">
    <!-- depth shadow -->
    <div class="card-shadow"></div>

    <div class="card" id="card">

      <!-- BANNER: dark anime image via data URI approach — we load it from URL -->
      <div class="banner">
        <img id="bannerImg" src="https://i.imgur.com/placeholder.png" alt="banner"
             onerror="this.style.display='none'"/>
      </div>

      <!-- AVATAR -->
      <div class="av-wrap">
        <div class="av-ring">
          <img id="avImg" src="" alt="av"
               onerror="this.outerHTML='<div class=\'av-ph\'>or</div>'"/>
        </div>
        <div class="sdot" id="sdot"></div>
      </div>

      <div class="body">
        <div class="name">orbit</div>
        <div class="handle">@orbit_yo</div>
        <div class="divline"></div>

        <div class="dark">

          <!-- Live activity from Lanyard -->
          <div class="act-label">
            <span class="dot-blink"></span>
            <span id="alabel">activity</span>
          </div>
          <div id="act"><div class="no-act">—</div></div>

          <!-- Static Spotify "now playing" embed -->
          <div class="sp-embed-wrap">
            <div class="sp-embed-label">
              <div class="sp-embed-icon">
                <img id="spIcon" src="" alt="spotify"/>
              </div>
              <span>now playing</span>
              <div class="wave" style="margin-left:auto">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>
            <div class="sp-static-row">
              <div class="sp-static-art">
                <!-- Album art for "SPECIALZ" by King Gnu (Jujutsu Kaisen OP) -->
                <img src="https://i.scdn.co/image/ab67616d0000b2737d9b8f7caa0e9ebead7b4b55"
                     alt="album"
                     onerror="this.parentElement.innerHTML='♪'"/>
              </div>
              <div class="tk">
                <div class="tk-name">SPECIALZ</div>
                <div class="tk-art">King Gnu</div>
                <div style="font-size:9px;color:#333;margin-top:3px;letter-spacing:.05em;">on repeat · 3:58</div>
              </div>
            </div>
            <div class="sp-bar-wrap">
              <div class="sp-bar-bg"><div class="sp-bar-fill"></div></div>
            </div>
            <!-- Audio player: hidden, loops the song -->
            <iframe id="spFrame"
              src="https://www.youtube.com/embed/8GW6sLrK40k?autoplay=1&loop=1&playlist=8GW6sLrK40k&controls=0&mute=0"
              width="1" height="1" frameborder="0"
              allow="autoplay; encrypted-media"
              style="position:absolute;opacity:0;pointer-events:none;top:-9999px;left:-9999px;">
            </iframe>
          </div>

          <!-- Socials: profile + discord server only -->
          <div class="links" style="margin-top:14px;">
            <a class="lnk" href="https://discord.gg/kitty-1377872412972154960" target="_blank" id="discordLnk">
              <img id="discordIcon" src="" alt="discord"/>
              discord
            </a>
            <a class="lnk" href="#" target="_blank" id="profileLnk">
              <img id="avSmall" src="" alt="pfp" style="border-radius:50%;"/>
              profile
            </a>
          </div>

        </div>
      </div>
    </div><!-- /card -->
  </div><!-- /wrap -->
</div><!-- /scene -->

<script>
// ══════════════════════════════════════════════
//  IMAGES — injected as base64 from uploads
//  We embed the banner + discord icon as data URLs
//  so no external hosting needed.
// ══════════════════════════════════════════════

// Banner = image 1 (dark anime art) — loaded via Lanyard CDN trick below
// We'll set banner background as a CSS gradient fallback and let Lanyard provide avatar

// ── BACKGROUND CANVAS ─────────────────────────
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W,H;
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
rsz();addEventListener('resize',rsz);

// Orbital particles
const pts=Array.from({length:90},()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  r:Math.random()*1.4+0.2,
  vx:(Math.random()-.5)*.25,
  vy:(Math.random()-.5)*.25,
  a:Math.random()*.25+.04,
  hue:Math.random()>0.7?200+Math.random()*60:0  // some blue/purple, most white
}));

// Slow shooting stars
const stars=Array.from({length:4},()=>mkStar());
function mkStar(){return{x:Math.random()*W,y:Math.random()*H*0.5,len:80+Math.random()*120,speed:3+Math.random()*4,life:0,maxLife:60+Math.random()*40};}

let mx=.5,my=.5;
addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H;});

function draw(){
  cx.fillStyle='rgba(5,5,8,0.2)';
  cx.fillRect(0,0,W,H);

  // Shooting stars
  stars.forEach((s,i)=>{
    s.life++;
    if(s.life>s.maxLife){stars[i]=mkStar();stars[i].x=Math.random()*W;return;}
    const prog=s.life/s.maxLife;
    const alpha=(prog<0.2?prog/0.2:prog>0.8?(1-prog)/0.2:1)*0.6;
    cx.beginPath();
    cx.moveTo(s.x+s.life*s.speed*0.7,s.y+s.life*s.speed*0.3);
    cx.lineTo(s.x+s.life*s.speed*0.7-s.len,s.y+s.life*s.speed*0.3-s.len*0.4);
    const g=cx.createLinearGradient(s.x,s.y,s.x-s.len,s.y-s.len*0.4);
    g.addColorStop(0,`rgba(200,220,255,${alpha})`);
    g.addColorStop(1,'rgba(200,220,255,0)');
    cx.strokeStyle=g;cx.lineWidth=1.2;cx.stroke();
  });

  // Floating particles + connections
  pts.forEach(p=>{
    p.x+=p.vx+(mx-.5)*.05;p.y+=p.vy+(my-.5)*.05;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    if(p.hue){cx.fillStyle=`hsla(${p.hue},80%,75%,${p.a})`;}
    else{cx.fillStyle=`rgba(255,255,255,${p.a})`;}
    cx.fill();
  });
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<100){
      cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);
      cx.strokeStyle=`rgba(125,211,252,${(1-d/100)*.04})`;
      cx.lineWidth=.5;cx.stroke();
    }
  }
  requestAnimationFrame(draw);
}
draw();

// ── 3D TILT (enhanced) ────────────────────────
const wrap=document.getElementById('wrap');
const card=document.getElementById('card');
let rx=0,ry=0,rz=0,tx=0,ty=0,hov=false,liftZ=0;

card.addEventListener('mouseenter',()=>{hov=true;});
card.addEventListener('mouseleave',()=>{hov=false;tx=0;ty=0;});
card.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  const nx=(e.clientX-r.left)/r.width-.5;
  const ny=(e.clientY-r.top)/r.height-.5;
  tx=ny*26;
  ty=-nx*26;
});

(function tilt(){
  rx+=(tx-rx)*.08;
  ry+=(ty-ry)*.08;
  const targetLift=hov?1.06:1;
  liftZ+=(targetLift-liftZ)*.08;
  wrap.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(${liftZ}) translateZ(${hov?20:0}px)`;
  requestAnimationFrame(tilt);
})();

// ── LANYARD ────────────────────────────────────
const UID='1516311607184064586';
const sdot=document.getElementById('sdot');
const act=document.getElementById('act');
const albl=document.getElementById('alabel');
const avImg=document.getElementById('avImg');
const avSmall=document.getElementById('avSmall');

// Spotify icon (image 3 — the custom one you uploaded)
// We use an imgur/CDN approach; you can replace src with a hosted URL of your image
// For now using a clean spotify-style circle
document.getElementById('spIcon').src='https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Spotify_logo_without_text.svg/200px-Spotify_logo_without_text.svg.png';

// Discord icon (image 4 — the glowing discord icon you uploaded)
// Replace this URL with a hosted version of your image
document.getElementById('discordIcon').src='https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png';

async function poll(){
  try{
    const j=await(await fetch(`https://api.lanyard.rest/v1/users/${UID}`)).json();
    if(!j.success)return;
    const d=j.data;
    const s=d.discord_status||'offline';
    const u=d.discord_user;

    // Status dot
    sdot.className='sdot '+({'online':'online','idle':'idle','dnd':'dnd'}[s]||'');

    // Avatar from Lanyard
    if(u && u.avatar){
      const url=`https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.webp?size=128`;
      avImg.src=url;
      avSmall.src=url;
    }

    // Activity
    const sp=d.activities?.find(a=>a.id==='spotify:1');
    const gm=d.activities?.find(a=>a.type===0&&a.id!=='spotify:1');

    if(sp){
      albl.textContent='listening to spotify';
      const img=sp.assets?.large_image?.startsWith('spotify:')
        ?`https://i.scdn.co/image/${sp.assets.large_image.replace('spotify:','')}`
        :null;
      act.innerHTML=`
        <div class="sp-row">
          ${img?`<img class="alb" src="${img}" alt=""/>`:'<div class="alb-ph"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Spotify_logo_without_text.svg/200px-Spotify_logo_without_text.svg.png" style="width:24px;height:24px;"/></div>'}
          <div class="tk">
            <div class="tk-name">${sp.details||''}</div>
            <div class="tk-art">${sp.state||''}</div>
          </div>
        </div>
        <div class="prog"><div class="prog-fill"></div></div>`;
    }else if(gm){
      albl.textContent='playing';
      act.innerHTML=`
        <div class="gm-row">
          <div class="gm-ico">🎮</div>
          <div>
            <div class="gm-name">${gm.name}</div>
            ${gm.details?`<div class="gm-det">${gm.details}</div>`:''}
          </div>
        </div>`;
    }else{
      albl.textContent='activity';
      act.innerHTML='<div class="no-act">—</div>';
    }
  }catch(e){}
}
poll();setInterval(poll,10000);

// ── BANNER image ────────────────────────────────
// Using the dark anime image — you need to host image 1 and paste the URL here
// Replace the src below with your hosted image URL (e.g. imgur, imgbb, etc.)
// For now using a fitting dark gradient fallback
const banner=document.querySelector('.banner');
const bannerImg=document.getElementById('bannerImg');

// Try to load; if you paste the hosted URL it will show
// bannerImg.src = 'YOUR_HOSTED_IMAGE_URL_HERE';
// Fallback: beautiful dark gradient that matches the anime aesthetic
bannerImg.style.display='none';
banner.style.background='linear-gradient(135deg, #0a0010 0%, #150025 30%, #0d0020 50%, #080015 70%, #0a000d 100%)';

// Add subtle animated overlay to banner
const bannerOverlay=document.createElement('div');
bannerOverlay.style.cssText='position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(125,50,200,0.25),transparent 65%),radial-gradient(ellipse at 70% 30%,rgba(80,0,160,0.2),transparent 55%);pointer-events:none;';
banner.appendChild(bannerOverlay);

// ── BANNER HINT ────────────────────────────────
